
<div class="container h-100">
  <h1>Buscador de Heroes</h1>

  <mat-divider></mat-divider>
  <br>


  <div class="row h-100">
    <div class="col-md-6">
      <mat-form-field [style.width.%]="100" appearance="fill">
        <input type="text"
              matInput
              (input)="buscar()"
              [(ngModel)]="termino"
              [matAutocomplete]="auto">
        <mat-autocomplete autoActiveFirstOption
                          #auto="matAutocomplete"
                          (optionSelected)="seleccionarHeroe( $event )"
                          #matautocomplete>
          <mat-option selected value="">Escribe un nombre</mat-option>
          <mat-option *ngFor="let heroe of heroes" [value]="heroe.id">
            {{ heroe.superhero }}
          </mat-option>
        </mat-autocomplete>
      </mat-form-field>

      <ng-container *ngIf="heroeSeleccionado">
        <app-heroe-card [heroe]="heroeSeleccionado"></app-heroe-card>
      </ng-container>
    </div>

    <!-- TODO botonoes: favorito - editar heroe -->

      <div class="fs-1 mt-1 text-center text-primary lh-1">Editar Heroe</div>
      <div class="fs-1 mt-1 text-center text-primary lh-1">Añadir a favorito</div>
    </div> -->
  </div>

</div>
