<div class="p-3">

    <h2 class="text-white">¿Estás seguro?</h2>

    <p class="text-white">Estas por eliminar a {{ heroe.superhero }}</p>

    <br>

    <div class="col-12 d-flex justify-content-between">
        <button (click)="deleteHeroe()" 
            mat-raised-button
            color="warn"
            class="col-4"> Eliminar </button>


        <button (click)="cancel()" 
            mat-raised-button
            class="col-4"> Cancelar </button>

    </div>

</div>
